services:
  enterprise-monitor:
    build: .
    container_name: enterprise-monitor
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: enterprise-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - enterprise-monitor
    restart: unless-stopped
